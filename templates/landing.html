<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News API</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        header {
            background: #020617;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #1e293b;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
        }

        .container {
            text-align: center;
            padding: 80px 20px;
        }

        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            display: inline-block;
            max-width: 500px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #38bdf8;
            color: black;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .btn:hover {
            background: #0ea5e9;
        }

        footer {
            margin-top: 60px;
            padding: 20px;
            text-align: center;
            font-size: 0.9rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<header>
    <h1>News Application API</h1>
</header>

<div class="container">
    <div class="card">
        <h2>Welcome</h2>
        <p>This is a RESTful News API built with Django and Docker.</p>
        <p>You can access news data using the endpoint below.</p>

        <a href="/api/news/" class="btn">View News API</a>
    </div>
</div>

<footer>
    <p>Developed by Keval Ramchander</p>
</footer>

</body>
</html>
